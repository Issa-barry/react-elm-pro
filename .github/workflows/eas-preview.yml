name: EAS Build – Preview (dev)

on:
  push:
    branches: [dev]

jobs:
  build-preview:
    name: Build APK Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build – preview (Android APK)
        run: eas build --profile preview --platform android --non-interactive
